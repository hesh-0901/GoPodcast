<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoPodcast</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: '#7c3aed',
            dark: '#0b0f19'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-dark text-white font-sans">

<!-- MAIN CONTAINER -->
<div class="max-w-md mx-auto md:max-w-6xl">

  <!-- HEADER -->
  <div class="flex items-center justify-between px-4 pt-6">
    <div class="flex items-center gap-3">
      <img src="https://i.pravatar.cc/40" class="w-10 h-10 rounded-full"/>
      <div>
        <p class="text-sm text-gray-400">Bonjour</p>
        <h2 class="font-semibold">Utilisateur</h2>
      </div>
    </div>

    <button class="p-2 bg-gray-800 rounded-full">
      <i data-lucide="bell"></i>
    </button>
  </div>

  <!-- SEARCH -->
  <div class="px-4 mt-6">
    <div class="flex items-center gap-3 bg-gray-900 px-4 py-3 rounded-xl">
      <i data-lucide="search" class="text-gray-400"></i>
      <input type="text" placeholder="Rechercher podcast..."
        class="bg-transparent outline-none w-full text-sm"/>
    </div>
  </div>

  <!-- SECTION PODCAST FOR YOU -->
  <section class="mt-8 px-4">
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-semibold text-lg">Pour toi</h3>
      <a href="#" class="text-primary text-sm">Voir tout</a>
    </div>

    <div class="flex gap-4 overflow-x-auto">

      <!-- CARD -->
      <div class="min-w-[250px] bg-gray-900 rounded-2xl p-4">
        <img 
          src="https://images.unsplash.com/photo-1504052434569-70ad5836ab65?w=400"
          class="rounded-xl mb-3 w-full h-40 object-cover"
        />
        <h4 class="font-semibold">Foi & Vie</h4>
        <p class="text-sm text-gray-400">Messages inspirants</p>
      </div>
      
      <div class="min-w-[250px] bg-gray-900 rounded-2xl p-4">
        <img 
          src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=400"
          class="rounded-xl mb-3 w-full h-40 object-cover"
        />
        <h4 class="font-semibold">Parole du jour</h4>
        <p class="text-sm text-gray-400">Chaque matin</p>
      </div>

    </div>
  </section>

  <!-- TOP CREATORS -->
  <section class="mt-8 px-4">
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-semibold text-lg">Créateurs</h3>
      <a href="#" class="text-primary text-sm">Voir tout</a>
    </div>

    <div class="flex gap-4 overflow-x-auto">
      <img src="https://i.pravatar.cc/100?img=1" class="w-16 h-16 rounded-full"/>
      <img src="https://i.pravatar.cc/100?img=2" class="w-16 h-16 rounded-full"/>
      <img src="https://i.pravatar.cc/100?img=3" class="w-16 h-16 rounded-full"/>
      <img src="https://i.pravatar.cc/100?img=4" class="w-16 h-16 rounded-full"/>
    </div>
  </section>

  <!-- TRENDING -->
  <section class="mt-8 px-4 pb-24">
    <h3 class="font-semibold text-lg mb-4">Tendance</h3>

    <div class="space-y-4">

      <!-- ITEM -->
      <div class="flex items-center justify-between bg-gray-900 p-3 rounded-xl">
        <div class="flex items-center gap-3">
          <img src="https://source.unsplash.com/100x100/?worship"
               class="w-14 h-14 rounded-lg"/>
          <div>
            <h4 class="font-medium">Louange profonde</h4>
            <p class="text-sm text-gray-400">12 épisodes</p>
          </div>
        </div>

        <button class="bg-primary p-3 rounded-full">
          <i data-lucide="play"></i>
        </button>
      </div>

      <div class="flex items-center justify-between bg-gray-900 p-3 rounded-xl">
        <div class="flex items-center gap-3">
          <img src="https://source.unsplash.com/100x100/?pray"
               class="w-14 h-14 rounded-lg"/>
          <div>
            <h4 class="font-medium">Prière du matin</h4>
            <p class="text-sm text-gray-400">8 épisodes</p>
          </div>
        </div>

        <button class="bg-primary p-3 rounded-full">
          <i data-lucide="play"></i>
        </button>
      </div>

    </div>
  </section>

</div>

<!-- BOTTOM NAV MOBILE -->
<div class="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 px-6 py-3 flex justify-between md:hidden">

  <button><i data-lucide="home"></i></button>
  <button><i data-lucide="compass"></i></button>
  <button><i data-lucide="plus-circle"></i></button>
  <button><i data-lucide="library"></i></button>
  <button><i data-lucide="user"></i></button>

</div>

<script>
  lucide.createIcons();
</script>

</body>
</html>
